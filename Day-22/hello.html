<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        label
        {
            display: block;
        }
    </style>
</head>
<body>
    <h1>which is Big??</h1>

    <label>A value:</label>
    <input type="text" id="t1">
    <label>B value:</label>
    <input type="text" id="t2">
    <label>C value:</label>
    <input type="text" id="t3">
    <br>
    <label >Result:</label>
    <input type="text" id="t4">
    <button onclick="sample()">Submit</button>
    <button onclick="Clear()">Erase</button>


    <script>
        function sample()
        {
            let t1=Number(document.getElementById('t1').value)
            let t2=Number(document.getElementById('t2').value)
            let t3=Number(document.getElementById('t3').value)

            if(t1 > t2 && t1 > t3)
        
            {
                document.getElementById('t4').value="A is big"
                
            }
            else if(t2 > t1 &&  t2 > t3)
            {
                 document.getElementById('t4').value="B is big"
            }
            else if( t3 > t1  && t3 > t2)
            {
                 document.getElementById('t4').value="C is big"
            }
            else{
                 document.getElementById('t4').value="All are equal"
            }

        }
        function Clear()
        {
            document.getElementById('t1').value=""
             document.getElementById('t2').value=""
              document.getElementById('t3').value=""
               document.getElementById('t4').value=""
        }
    </script>
</body>
</html>
