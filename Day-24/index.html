<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths.function</title>
</head>
<body>
    

    <label>Generate OTP</label><br>
    <input type="text" id="t1"><br>
    <button type="submit" onclick="sample()">GetOTP</button>

    <script>
        function sample()
        {
            let a1= Math.floor(Math.random()*1000000)
            document.getElementById('t1').value=a1;

        }
    </script>
</body>
</html>
