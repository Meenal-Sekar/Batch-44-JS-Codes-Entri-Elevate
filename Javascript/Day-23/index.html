<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Banking App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Simple Banking Application</h2>

  <label>Select Option</label>
  <select id="option">
     <option value="">Choose the option</option>
    <option value="deposit">Deposit</option>
    <option value="withdraw">Withdraw</option>
    <option value="balance">Check Balance</option>
    <option value="pin">Change PIN</option>
  </select>

  <input type="number" id="amount" placeholder="Enter Amount">

  <input type="password" id="pin" placeholder="Enter PIN">

  <button onclick="banking()">Submit</button>
  
  <button onclick="Click()">Erase</button>

  <p id="result"></p>
</div>

<script src="index.js"></script>
</body>
</html>
