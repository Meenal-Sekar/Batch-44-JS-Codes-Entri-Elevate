<!DOCTYPE html>
<html>
<head>
<title>Multiplication Table</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin-top:100px;
}

.container{
background:white;
width:300px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
padding:8px;
width:90%;
margin-bottom:10px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

p{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>Multiplication Table</h2>

<input type="number" id="number" placeholder="Enter a number">

<button onclick="generateTable()">Generate Table</button>

<p id="result"></p>

</div>

<script>
    function generateTable(){

let num = document.getElementById("number").value;

let result = "";

for(let i = 1; i <= 10; i++){

result += num + " x " + i + " = " + (num*i) + "<br>";

}

document.getElementById("result").innerHTML = result;

}
</script>

</body>
</html>
